app = "oc-papers"
primary_region = "sea"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  APP_DATA_DIR = "/data"
  SQLITE_PATH = "/data/metrics.sqlite"
  PDF_CACHE_DIR = "/data/pdf-cache"
  TRUST_PROXY = "1"
  SESSION_COOKIE_SECURE = "1"
  DOWNLOAD_FILES = "0"
  DOCUMENT_SYNC_INTERVAL_MS = "86400000"
  DOCUMENT_SYNC_PAGE_SIZE = "100"
  DOCUMENT_SYNC_SCAN_LIMIT = "50000"
  CATALOGUE_LOOKUP_ENABLED = "1"
  CATALOGUE_LOOKUP_ON_START = "1"
  CATALOGUE_LOOKUP_PAGE_SIZE = "200"

[processes]
  app = "npm start"
  worker = "npm run worker"

[[mounts]]
  source = "oc_papers_data"
  destination = "/data"
  processes = ["app", "worker"]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[vm]]
  processes = ["app"]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[[vm]]
  processes = ["worker"]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
